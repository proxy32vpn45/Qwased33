name: Run parser

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"  # каждые 10 минут

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install aiohttp

      - name: Run script
        run: python main.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output.txt
          git commit -m "auto update output" || echo "no changes"
          git push
